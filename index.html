<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Night Spirits</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(45deg,#020617,#001233,#020617);
background-size:300% 300%;
animation:bg 10s infinite alternate;
color:white;
text-align:center;
}

@keyframes bg{
0%{background-position:0%}
100%{background-position:100%}
}

h1{
color:#4cc9ff;
text-shadow:0 0 20px #4cc9ff;
}

input{
padding:10px;
margin:5px;
border:none;
border-radius:6px;
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:6px;
background:#1f4cff;
color:white;
}

table{
width:95%;
margin:auto;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #333;
}

.top1{background:black}
.top2{background:#444}
.top3{background:#999;color:black}

#trophy{
font-size:80px;
display:none;
}

</style>

</head>

<body>

<h1>Night Spirits</h1>

<div id="login">

<input id="user" placeholder="login">
<input id="pass" type="password" placeholder="password">

<br>

<button onclick="login()">Login</button>
<button onclick="viewer()">Просмотр</button>

</div>

<div id="panel" style="display:none">

<div id="trophy">🏆</div>

<button onclick="addTeam()">Добавить</button>
<button onclick="sortTable()">Сортировать</button>

<table id="table">

<tr>
<th>TOP</th>
<th>TEAM</th>
<th>KILLS</th>
<th>PTS</th>
<th>TOTAL</th>
</tr>

</table>

<h2>Graph</h2>
<canvas id="chart"></canvas>

</div>

<script>

const users={

Apa:{pass:"1029384756",role:"admin"},
popstar:{pass:"popstar1",role:"editor"},
"Люся":{pass:"nik69nikita",role:"editor"}

}

let role="viewer"

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(users[u] && users[u].pass==p){

role=users[u].role

document.getElementById("login").style.display="none"
document.getElementById("panel").style.display="block"

load()

}

else{

alert("Неверный логин")

}

}

function viewer(){

role="viewer"

document.getElementById("login").style.display="none"
document.getElementById("panel").style.display="block"

load()

}

function addTeam(){

if(role=="viewer") return

let table=document.getElementById("table")

let row=table.insertRow()

row.innerHTML=`
<td>${table.rows.length-1}</td>
<td contenteditable="true">TEAM</td>
<td contenteditable="true" oninput="calc()">0</td>
<td contenteditable="true" oninput="calc()">0</td>
<td>0</td>
`

}

function calc(){

let rows=document.getElementById("table").rows

for(let i=1;i<rows.length;i++){

let kills=parseInt(rows[i].cells[2].innerText)||0
let pts=parseInt(rows[i].cells[3].innerText)||0

rows[i].cells[4].innerText=kills+pts

}

updateChart()
save()

}

function sortTable(){

let table=document.getElementById("table")

let rows=[...table.rows].slice(1)

rows.sort((a,b)=>b.cells[4].innerText-a.cells[4].innerText)

rows.forEach(r=>table.appendChild(r))

for(let i=1;i<table.rows.length;i++){

table.rows[i].cells[0].innerText=i

table.rows[i].classList.remove("top1","top2","top3")

if(i==1){
table.rows[i].classList.add("top1")
document.getElementById("trophy").style.display="block"
}

if(i==2) table.rows[i].classList.add("top2")
if(i==3) table.rows[i].classList.add("top3")

}

updateChart()
save()

}

let chart

function updateChart(){

let names=[]
let totals=[]

let rows=document.getElementById("table").rows

for(let i=1;i<rows.length;i++){

names.push(rows[i].cells[1].innerText)
totals.push(rows[i].cells[4].innerText)

}

if(chart) chart.destroy()

chart=new Chart(document.getElementById("chart"),{

type:"bar",

data:{
labels:names,
datasets:[{
label:"TOTAL",
data:totals,
backgroundColor:"#4cc9ff"
}]
}

})

}

function save(){

localStorage.setItem("tournament",table.innerHTML)

}

function load(){

let data=localStorage.getItem("tournament")

if(data){
table.innerHTML=data
}

updateChart()

}

</script>

</body>

</html>
