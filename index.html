<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Night Spirits Tournament</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(270deg,#020024,#090979,#000000);
background-size:600% 600%;
animation:bgMove 10s infinite;
color:white;
text-align:center;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

h1{
color:#00eaff;
text-shadow:0 0 20px #00eaff;
}

#poster{
padding:20px;
}

table{
width:100%;
max-width:900px;
margin:auto;
border-collapse:collapse;
background:rgba(0,0,0,0.6);
}

th{
background:#001f3f;
padding:10px;
}

td{
padding:8px;
border-bottom:1px solid #333;
}

input{
width:80px;
background:#111;
color:white;
border:none;
padding:5px;
}

.team{
width:150px;
}

button{
margin:10px;
padding:10px 20px;
border:none;
border-radius:6px;
background:#00eaff;
color:black;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#00a6b8;
}

.first{
background:#111;
}

.second{
background:#444;
}

.third{
background:#777;
}

.trophy{
font-size:22px;
}

</style>
</head>

<body>

<div id="poster">

<h1>🏆 Night Spirits Tournament</h1>

<button onclick="addTeam()">Добавить команду</button>
<button onclick="sortTable()">Сортировать</button>
<button onclick="download()">Скачать PNG</button>

<table id="table">

<tr>
<th>Top</th>
<th>Team</th>
<th>PTS</th>
<th>Kills</th>
<th>Total</th>
<th>❌</th>
</tr>

</table>

<h2>Статистика турнира</h2>

<canvas id="chart"></canvas>

</div>

<script>

let table=document.getElementById("table")

function addTeam(){

let row=table.insertRow()

row.innerHTML=`

<td class="rank">0</td>

<td>
<input class="team" placeholder="Team">
</td>

<td>
<input type="number" value="0" class="pts">
</td>

<td>
<input type="number" value="0" class="kills">
</td>

<td class="total">0</td>

<td>
<button onclick="del(this)">X</button>
</td>

`

}

function del(btn){

btn.parentElement.parentElement.remove()

}

function sortTable(){

let rows=[...table.rows].slice(1)

rows.forEach(r=>{

let pts=r.querySelector(".pts").value*1
let kills=r.querySelector(".kills").value*1

r.querySelector(".total").innerText=pts+kills

})

rows.sort((a,b)=>{

let A=a.querySelector(".total").innerText
let B=b.querySelector(".total").innerText

return B-A

})

rows.forEach((r,i)=>{

table.appendChild(r)

let rank=i+1

r.querySelector(".rank").innerHTML=rank

r.classList.remove("first","second","third")

if(rank==1){
r.classList.add("first")
r.querySelector(".rank").innerHTML="🏆 1"
}

if(rank==2){
r.classList.add("second")
}

if(rank==3){
r.classList.add("third")
}

})

updateChart()

save()

}

function updateChart(){

let names=[]
let totals=[]

let rows=[...table.rows].slice(1)

rows.forEach(r=>{

let name=r.querySelector(".team").value
let total=r.querySelector(".total").innerText

names.push(name)
totals.push(total)

})

new Chart(document.getElementById("chart"),{

type:"bar",

data:{
labels:names,
datasets:[{
label:"Total Points",
data:totals,
backgroundColor:"#00eaff"
}]
},

options:{
animation:true
}

})

}

function download(){

html2canvas(document.getElementById("poster")).then(canvas=>{

let link=document.createElement("a")

link.download="tournament.png"

link.href=canvas.toDataURL()

link.click()

})

}

function save(){

localStorage.setItem("tournament",table.innerHTML)

}

function load(){

let data=localStorage.getItem("tournament")

if(data){
table.innerHTML=data
}

}

setInterval(save,3000)

load()

</script>

</body>
</html>
