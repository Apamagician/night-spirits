<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Night Spirits Tournament</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#0a0505;
color:white;
font-family:Arial;
text-align:center;
padding:10px;
}

h1{
color:#ff2e2e;
text-shadow:0 0 25px #ff2e2e;
}

.logo{
font-size:28px;
margin-bottom:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:8px;
border-bottom:1px solid #333;
}

tr:hover{
background:rgba(255,0,0,0.2);
}

input{
width:90%;
background:#111;
border:1px solid #333;
color:white;
padding:5px;
}

button{
padding:8px 12px;
margin:5px;
background:#b31212;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#ff2e2e;
}

#panel{
display:none;
}

#logs{
max-height:150px;
overflow:auto;
background:#111;
padding:10px;
margin-top:10px;
font-size:12px;
}

</style>

</head>

<body>

<h1 class="logo">🔥 Night Spirits 🔥</h1>

<div id="login">

<input id="user" placeholder="login">
<input id="pass" type="password" placeholder="password">

<br>

<button onclick="login()">Login</button>
<button onclick="viewer()">Viewer</button>

</div>

<div id="panel">

<button onclick="sortTable()">Сортировать</button>
<button onclick="addRow()">Добавить</button>
<button onclick="save()">Сохранить</button>

<table id="table">

<tr>
<th>TOP</th>
<th>Team</th>
<th>PTS</th>
<th>Kills</th>
<th>Total</th>
<th>X</th>
</tr>

</table>

<h2>График</h2>

<canvas id="chart"></canvas>

<h3>Logs (admin only)</h3>

<div id="logs"></div>

</div>

<script>

const users={
admin:{pass:"1029384756",role:"Apa"},
editor1:{pass:"popstar1",role:"popstar"},
editor2:{pass:"nik69nikita",role:"Люся"}
}

let role="viewer"

function log(text){

let logs=JSON.parse(localStorage.getItem("logs")||"[]")

logs.push(new Date().toLocaleTimeString()+" "+text)

localStorage.setItem("logs",JSON.stringify(logs))

renderLogs()

}

function renderLogs(){

if(role!="admin") return

let logs=JSON.parse(localStorage.getItem("logs")||"[]")

document.getElementById("logs").innerHTML=logs.join("<br>")

}

function login(){

let u=user.value
let p=pass.value

if(users[u] && users[u].pass==p){

role=users[u].role

login.style.display="none"
panel.style.display="block"

log(u+" login")

load()

}else{

alert("wrong login")

}

}

function viewer(){

role="viewer"

login.style.display="none"
panel.style.display="block"

load()

}

function addRow(){

if(role=="viewer") return

let t=document.getElementById("table")

let r=t.insertRow()

let i=t.rows.length-1

r.innerHTML=`

<td>${i}</td>

<td contenteditable="true">team</td>

<td contenteditable="true" oninput="calc()">0</td>

<td contenteditable="true" oninput="calc()">0</td>

<td>0</td>

<td><button onclick="del(this)">X</button></td>

`

log("row added")

}

function del(btn){

if(role=="viewer") return

btn.parentElement.parentElement.remove()

calc()

log("row deleted")

}

function calc(){

let rows=table.rows

for(let i=1;i<rows.length;i++){

let pts=parseInt(rows[i].cells[2].innerText)||0
let kills=parseInt(rows[i].cells[3].innerText)||0

rows[i].cells[4].innerText=pts+kills

}

updateChart()

}

function sortTable(){

let rows=[...table.rows].slice(1)

rows.sort((a,b)=>b.cells[4].innerText-a.cells[4].innerText)

rows.forEach(r=>table.appendChild(r))

for(let i=1;i<table.rows.length;i++){

table.rows[i].cells[0].innerText=i

}

log("table sorted")

}

function save(){

localStorage.setItem("table",table.innerHTML)

log("saved")

}

function load(){

let data=localStorage.getItem("table")

if(data){

table.innerHTML=data

}

calc()

renderLogs()

}

function updateChart(){

let names=[]
let totals=[]

let rows=table.rows

for(let i=1;i<rows.length;i++){

names.push(rows[i].cells[1].innerText)
totals.push(rows[i].cells[4].innerText)

}

new Chart(chart,{

type:"bar",

data:{
labels:names,
datasets:[{
label:"Score",
data:totals,
backgroundColor:"#ff2e2e"
}]
}

})

}

setInterval(()=>{

localStorage.setItem("table",table.innerHTML)

},3000)

</script>

</body>

</html>
