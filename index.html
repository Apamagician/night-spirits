<!DOCTYPE html>
<html>

}

h1{

}

table{

margin-top:20px;
}

th,td{

}

</head>

<body>

<h1>Night Spirits Clan</h1>

<div id="login">

<input id="user" placeholder="login">
<input id="pass" type="password" placeholder="password">

<table id="table">

<tr>
<th>Player</th>
<th>Kills</th>
<th>Wins</th>
<th>Delete</th>
</tr>

</table>

</div>

<script>

let admin="Apa"
let password="1029384756"

let admin="popstar"
let password="popstar"

function login(){

<button onclick="viewer()">Просмотр сайта</button>
  
let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u==admin && p==password){

document.getElementById("login").style.display="none"
document.getElementById("panel").style.display="block"

load()

}

else{

alert("Wrong login")

}

}

function addPlayer(){

let table=document.getElementById("table")

let row=table.insertRow()

row.innerHTML=`

<td contenteditable="true">player</td>
<td contenteditable="true">0</td>
<td contenteditable="true">0</td>
<td><button onclick="deleteRow(this)">X</button></td>

`

}

function deleteRow(btn){

btn.parentElement.parentElement.remove()

}

function save(){

localStorage.setItem("players",document.getElementById("table").innerHTML)

alert("saved")

}

function load(){

let data=localStorage.getItem("players")

if(data){

document.getElementById("table").innerHTML=data

}

}

</script>
