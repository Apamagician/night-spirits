<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Night Spirits Esports</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#040404;
color:white;
font-family:Arial;
text-align:center;
margin:0;
padding:20px;
}

.logo{
font-size:40px;
color:#ff2e2e;
text-shadow:0 0 35px #ff0000;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#111;
}

th:nth-child(1){color:#ffd700;}
th:nth-child(2){color:#00eaff;}
th:nth-child(3){color:#ff8800;}
th:nth-child(4){color:#ff2e2e;}
th:nth-child(5){color:#00ff9c;}

th,td{
padding:10px;
border-bottom:1px solid #333;
}

td:nth-child(3){color:#ff8800;font-weight:bold;}
td:nth-child(4){color:#ff2e2e;font-weight:bold;}
td:nth-child(5){color:#00ff9c;font-weight:bold;}

tr:hover{
background:rgba(255,0,0,0.2);
}

.winner{
background:linear-gradient(90deg,#ffd700,#ffcc00,#ffd700);
color:black;
font-weight:bold;
}

button{
background:#b31212;
border:none;
color:white;
padding:10px 14px;
margin:5px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#ff2e2e;
}

input{
background:#111;
border:1px solid #333;
color:white;
padding:8px;
border-radius:5px;
}

#panel{
display:none;
}

#adminPanel{
background:#111;
padding:10px;
border:1px solid #333;
margin-top:15px;
}

#status{
margin-top:10px;
color:#00ff9c;
}

</style>

</head>

<body>

<div class="logo">🔥 Night Spirits Esports 🔥</div>

<div id="loginBox">

<input id="user" placeholder="login">
<input id="pass" type="password" placeholder="password">

<br>

<button onclick="login()">Login</button>
<button onclick="viewer()">Просмотр</button>

</div>

<div id="panel">

<div id="profile"></div>

<div id="adminPanel">

<button onclick="addTeam()">Добавить команду</button>
<button onclick="sortTable()">Сортировать</button>
<button onclick="save()">Сохранить</button>
<button onclick="exportTable()">📤 Экспорт таблицы</button>

</div>

<table id="table">

<tr>
<th>TOP</th>
<th>TEAM</th>
<th>PTS</th>
<th>KILLS</th>
<th>TOTAL</th>
<th>X</th>
</tr>

</table>

<div id="status">💾 ожидание сохранения</div>

<h2>📊 Турнирный график</h2>

<canvas id="chart"></canvas>

</div>

<script>

const users={
Apa:{pass:"1029384756",role:"admin"},
popstar:{pass:"popstar1",role:"editor"},
"Люся":{pass:"nik69nikita",role:"editor"}
}

let role="viewer"
let username="viewer"
let chart

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(users[u] && users[u].pass==p){

role=users[u].role
username=u

document.getElementById("loginBox").style.display="none"
document.getElementById("panel").style.display="block"

document.getElementById("profile").innerHTML="👤 "+username+" | "+role

load()

}else{

alert("Wrong login")

}

}

function viewer(){

role="viewer"

document.getElementById("loginBox").style.display="none"
document.getElementById("panel").style.display="block"

document.getElementById("profile").innerHTML="👁 Viewer"

document.getElementById("adminPanel").style.display="none"

load()

}

function addTeam(){

if(role=="viewer") return

let table=document.getElementById("table")

if(table.rows.length>30){
alert("Max 30 teams")
return
}

let row=table.insertRow()

row.innerHTML=`

<td>${table.rows.length-1}</td>
<td contenteditable="true">Team</td>
<td contenteditable="true" oninput="calc()">0</td>
<td contenteditable="true" oninput="calc()">0</td>
<td>0</td>
<td><button onclick="del(this)">X</button></td>

`

}

function del(btn){

if(role=="viewer") return

btn.parentElement.parentElement.remove()

calc()

}

function calc(){

let rows=document.getElementById("table").rows

for(let i=1;i<rows.length;i++){

let pts=parseInt(rows[i].cells[2].innerText)||0
let kills=parseInt(rows[i].cells[3].innerText)||0

rows[i].cells[4].innerText=pts+kills

}

updateChart()

}

function sortTable(){

let table=document.getElementById("table")

let rows=[...table.rows].slice(1)

rows.sort((a,b)=>b.cells[4].innerText-a.cells[4].innerText)

rows.forEach(r=>table.appendChild(r))

for(let i=1;i<table.rows.length;i++){
table.rows[i].cells[0].innerText=i
}

highlightWinner()

updateChart()

}

function highlightWinner(){

let rows=document.getElementById("table").rows

for(let i=1;i<rows.length;i++){
rows[i].classList.remove("winner")
}

if(rows.length>1){
rows[1].classList.add("winner")
}

}

function save(){

localStorage.setItem("table",document.getElementById("table").innerHTML)

document.getElementById("status").innerHTML="✅ сохранено"

}

function load(){

let data=localStorage.getItem("table")

if(data){
document.getElementById("table").innerHTML=data
}

updateChart()
highlightWinner()

}

function updateChart(){

let names=[]
let totals=[]

let rows=document.getElementById("table").rows

for(let i=1;i<rows.length;i++){
names.push(rows[i].cells[1].innerText)
totals.push(Number(rows[i].cells[4].innerText)||0)
}

if(chart){
chart.destroy()
}

chart=new Chart(document.getElementById("chart"),{

type:"bar",

data:{
labels:names,
datasets:[{
label:"Total Score",
data:totals,
backgroundColor:"#ff2e2e"
}]
},

options:{
animation:{
duration:1500
}
}

})

}

function exportTable(){

let table=document.getElementById("table").outerHTML

let blob=new Blob([table],{type:"text/html"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="night_spirits_table.html"

a.click()

}

setInterval(()=>{

localStorage.setItem("table",document.getElementById("table").innerHTML)

document.getElementById("status").innerHTML="💾 автосохранение..."

setTimeout(()=>{
document.getElementById("status").innerHTML="✅ данные сохранены"
},1000)

},5000)

</script>

</body>

</html>
