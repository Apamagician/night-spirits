<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Night Spirits Tournament</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
background:linear-gradient(-45deg,#020617,#0a1c3d,#001233,#020617);
background-size:400% 400%;
animation:bg 15s infinite alternate;
}

@keyframes bg{
0%{background-position:0%}
100%{background-position:100%}
}

.logo{
font-size:48px;
color:#4cc9ff;
text-shadow:0 0 30px #4cc9ff;
margin-top:20px;
}

/* BIG TROPHY */

#bigTrophy{
font-size:120px;
opacity:0;
transform:scale(0);
transition:0.6s;
}

#bigTrophy.show{
opacity:1;
transform:scale(1);
animation:pop 1s;
}

@keyframes pop{
0%{transform:scale(0)}
60%{transform:scale(1.4)}
100%{transform:scale(1)}
}

table{
width:95%;
margin:auto;
border-collapse:collapse;
margin-top:20px;
background:#08142e;
}

th{
background:#0e2247;
color:#7bdcff;
}

th,td{
padding:10px;
border-bottom:1px solid #1c2e57;
}

tr:hover{
background:#0e244a;
}

/* TOP COLORS */

.top1{
background:#000;
font-weight:bold;
}

.top2{
background:#444;
}

.top3{
background:#999;
color:black;
}

button{

background:#1f4cff;
border:none;
color:white;
padding:10px 16px;
margin:6px;
border-radius:6px;
cursor:pointer;

}

button:hover{
background:#4c6cff;
}

</style>

</head>

<body>

<div class="logo">Night Spirits</div>

<div id="bigTrophy">🏆</div>

<div>

<button onclick="addTeam()">Добавить команду</button>
<button onclick="sortTable()">Сортировать</button>
<button onclick="downloadPNG()">📥 PNG</button>
<button onclick="downloadCSV()">📁 CSV</button>

</div>

<div id="capture">

<table id="table">

<tr>
<th>TOP</th>
<th>TEAM</th>
<th>WWCD</th>
<th>KILLS</th>
<th>PLC</th>
<th>TOTAL</th>
</tr>

</table>

</div>

<h2>📊 Tournament Stats</h2>

<canvas id="chart"></canvas>

<script>

let chart

function addTeam(){

let table=document.getElementById("table")

if(table.rows.length>30){
alert("Max 30 teams")
return
}

let row=table.insertRow()

row.innerHTML=

<td>${table.rows.length-1}</td>
<td contenteditable="true">TEAM</td>
<td contenteditable="true" oninput="calc()">0</td>
<td contenteditable="true" oninput="calc()">0</td>
<td contenteditable="true" oninput="calc()">0</td>
<td>0</td>



save()

}

function calc(){

let rows=document.getElementById("table").rows

for(let i=1;i<rows.length;i++){

let wwcd=parseInt(rows[i].cells[2].innerText)||0
let kills=parseInt(rows[i].cells[3].innerText)||0
let plc=parseInt(rows[i].cells[4].innerText)||0

rows[i].cells[5].innerText=wwcd+kills+plc

}

updateChart()
save()

}

function sortTable(){

let table=document.getElementById("table")

let rows=[...table.rows].slice(1)

rows.sort((a,b)=>b.cells[5].innerText-a.cells[5].innerText)

rows.forEach(r=>table.appendChild(r))

for(let i=1;i<table.rows.length;i++){

table.rows[i].cells[0].innerText=i

table.rows[i].classList.remove("top1","top2","top3")

if(i==1){

table.rows[i].classList.add("top1")

let team=table.rows[i].cells[1]

team.innerHTML="🏆 "+team.innerText

document.getElementById("bigTrophy").classList.add("show")

}

if(i==2) table.rows[i].classList.add("top2")
if(i==3) table.rows[i].classList.add("top3")

}

updateChart()
save()

}

/* GRAPH */

function updateChart(){

let names=[]
let totals=[]

let rows=document.getElementById("table").rows

for(let i=1;i<rows.length;i++){

names.push(rows[i].cells[1].innerText)
totals.push(Number(rows[i].cells[5].innerText)||0)

}

if(chart) chart.destroy()

chart=new Chart(document.getElementById("chart"),{

type:"bar",

data:{
labels:names,
datasets:[{
label:"TOTAL",
data:totals,
backgroundColor:"#4cc9ff"
}]
},

options:{
animation:{duration:1500}
}

})

}

/* EXPORT PNG */

function downloadPNG(){

html2canvas(document.getElementById("capture")).then(canvas=>{

let link=document.createElement("a")

link.download="night_spirits.png"

link.href=canvas.toDataURL()

link.click()

})

}

/* EXPORT CSV */
  function downloadCSV(){

let rows=document.querySelectorAll("table tr")
let csv=[]

rows.forEach(r=>{

let cols=r.querySelectorAll("td,th")
let row=[]

cols.forEach(c=>row.push(c.innerText))

csv.push(row.join(","))

})

let blob=new Blob([csv.join("\n")])
let link=document.createElement("a")

link.href=URL.createObjectURL(blob)
link.download="tournament.csv"

link.click()

}

/* STORAGE */

function save(){

localStorage.setItem("tournament",document.getElementById("table").innerHTML)

}

function load(){

let data=localStorage.getItem("tournament")

if(data){
document.getElementById("table").innerHTML=data
}

updateChart()

}

setInterval(load,3000)

window.onload=load

</script>

</body>

</html>
