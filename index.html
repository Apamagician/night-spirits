<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Night Spirits</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(270deg,#020024,#090979,#000);
background-size:400% 400%;
animation:bg 12s infinite alternate;
color:white;
text-align:center;
margin:0;
}

@keyframes bg{
0%{background-position:0%}
100%{background-position:100%}
}

h1{
font-size:40px;
background:linear-gradient(90deg,#00eaff,#00ff9d);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

button{
padding:10px 15px;
margin:5px;
border:none;
background:#00eaff;
color:black;
font-weight:bold;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#00ffd0;
}

table{
width:95%;
margin:auto;
border-collapse:collapse;
background:rgba(0,0,0,0.7);
}

th,td{
padding:10px;
border-bottom:1px solid #333;
}

input{
width:70px;
background:#111;
color:white;
border:none;
padding:5px;
}

.rank1{background:black}
.rank2{background:#444}
.rank3{background:#777}

.team{
background:linear-gradient(90deg,#00eaff,#00ff9d);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
font-weight:bold;
}

</style>

</head>

<body>

<div id="login">

<h1>Night Spirits</h1>

<input id="user" placeholder="Login">
<input id="pass" type="password" placeholder="Password">

<br>

<button onclick="login()">Войти</button>
<button onclick="viewer()">Просмотр</button>

</div>

<div id="panel" style="display:none">

<h1>Night Spirits</h1>

<button onclick="addTeam()">Добавить</button>
<button onclick="sortTable()">Сортировать</button>
<button onclick="download()">Скачать PNG</button>
<button onclick="logout()">Выйти</button>

<table id="table">

<tr>
<th>TOP</th>
<th>TEAM</th>
<th>PTS</th>
<th>KILLS</th>
<th>TOTAL</th>
<th>DEL</th>
</tr>

</table>

<h2>Stats</h2>

<canvas id="chart"></canvas>

</div>

<script>

const users={
Apa:{pass:"1029384756",role:"admin"},
popstar:{pass:"popstar1",role:"editor"},
"Люся":{pass:"nik69nikita",role:"editor"}
}

let role="viewer"
let table=document.getElementById("table")
let chart

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(users[u] && users[u].pass==p){

role=users[u].role
localStorage.setItem("ns_role",role)

document.getElementById("login").style.display="none"
document.getElementById("panel").style.display="block"

load()

}else{

alert("Wrong login")

}

}

function viewer(){

role="viewer"
localStorage.setItem("ns_role","viewer")

document.getElementById("login").style.display="none"
document.getElementById("panel").style.display="block"

load()

}

function logout(){

save()
localStorage.removeItem("ns_role")
location.reload()

}

function addTeam(){

if(role=="viewer") return

let row=table.insertRow()

row.innerHTML=`

<td class="rank">0</td>
<td contenteditable="true" class="team">Team</td>
<td contenteditable="true" class="pts">0</td>
<td contenteditable="true" class="kills">0</td>
<td class="total">0</td>
<td><button onclick="del(this)">X</button></td>

`

}

function del(btn){

if(role=="viewer") return

btn.parentElement.parentElement.remove()

save()
updateChart()

}

function sortTable(){

let rows=[...table.rows].slice(1)

rows.forEach(r=>{

let pts=parseInt(r.cells[2].innerText)||0
let kills=parseInt(r.cells[3].innerText)||0

r.cells[4].innerText=pts+kills

})

rows.sort((a,b)=>b.cells[4].innerText-a.cells[4].innerText)

rows.forEach((r,i)=>{

table.appendChild(r)

r.cells[0].innerText=i+1

r.classList.remove("rank1","rank2","rank3")

if(i==0){
r.classList.add("rank1")
r.cells[0].innerHTML="🏆 1"
}

if(i==1) r.classList.add("rank2")
if(i==2) r.classList.add("rank3")

})

updateChart()
save()

}

function updateChart(){

let names=[]
let totals=[]

let rows=[...table.rows].slice(1)

rows.forEach(r=>{

names.push(r.cells[1].innerText)
totals.push(r.cells[4].innerText)

})

if(chart) chart.destroy()

chart=new Chart(document.getElementById("chart"),{

type:"bar",

data:{
labels:names,
datasets:[{
label:"Total",
data:totals,
backgroundColor:"#00eaff"
}]
}

})

}

function download(){

html2canvas(document.getElementById("panel")).then(canvas=>{

let link=document.createElement("a")
link.download="NightSpirits.png"
link.href=canvas.toDataURL()
link.click()

})

}

function save(){

localStorage.setItem("ns_table",table.innerHTML)

}

function load(){

let data=localStorage.getItem("ns_table")

if(data){
table.innerHTML=data
}

updateChart()

}

setInterval(save,3000)

window.onload=function(){

let savedRole=localStorage.getItem("ns_role")

if(savedRole){

role=savedRole

document.getElementById("login").style.display="none"
document.getElementById("panel").style.display="block"

}

load()

}

</script>

</body>
</html>
